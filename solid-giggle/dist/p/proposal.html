<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Plus Jakarta Sans',sans-serif;background:#fff;color:#3a4560}

.cover{background:linear-gradient(170deg,#1a2744,#263a5e);padding:72px 32px 60px;position:relative;overflow:hidden}.orb{position:absolute;border-radius:50%}.o1{width:500px;height:500px;top:-20%;right:-10%;background:rgba(74,124,255,.08)}.o2{width:400px;height:400px;bottom:-30%;left:-5%;background:rgba(74,124,255,.05)}.ci{max-width:900px;margin:0 auto;position:relative}
.badge{display:inline-block;background:rgba(74,124,255,.2);padding:6px 18px;border-radius:20px;font-size:12px;font-weight:700;color:#8cb4ff;letter-spacing:.1em;text-transform:uppercase;margin-bottom:24px}
.cover h1{font-size:38px;font-weight:800;color:#fff;line-height:1.15;margin-bottom:16px}.sub2{font-size:18px;color:rgba(255,255,255,.7);margin-bottom:36px}.sub2 strong{color:#fff}
.meta{display:flex;gap:36px;flex-wrap:wrap}.mi label{display:block;font-size:11px;color:rgba(255,255,255,.4);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}.mi span{font-size:15px;color:#fff;font-weight:600}
.sec{max-width:900px;margin:0 auto;padding:56px 32px}.sl{font-size:14px;font-weight:600;color:#4a7cff;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}

.dv{height:1px;background:linear-gradient(90deg,transparent,#dde1e8,transparent);margin:0 32px}.bl{background:#f7f8fc}
.st{width:100%;border-collapse:collapse;font-size:15px}.st thead th{padding:16px 24px;background:#1a2744;color:#fff;font-weight:700;text-align:left}.st thead th:last-child{text-align:right}.st td{padding:16px 24px;border-bottom:1px solid #f0f1f5}.st td:last-child{text-align:right;font-weight:700;color:#1a2744}.disc-row td{color:#2e7d32!important;font-weight:600!important}.total-row td{font-size:17px!important;font-weight:800!important;color:#1a2744!important;border-top:2px solid #1a2744}
.tc{background:#fff;border-radius:14px;padding:24px 28px;border:1px solid #e8ecf2;margin-bottom:16px}.tc h3{font-size:15px;font-weight:700;color:#1a2744;margin-bottom:10px}.tc p{font-size:14px;line-height:1.7;margin:0}.tc ul{padding-left:20px;margin-top:8px}.tc li{font-size:14px;line-height:1.7;margin-bottom:4px}
.ab{background:rgba(74,124,255,.06);border-radius:14px;padding:24px 28px;border-left:4px solid #4a7cff;font-size:14px;line-height:1.7;margin:24px 0}
.pp{background:#fff;border-radius:18px;padding:28px 32px;border:2px solid #4a7cff;display:flex;align-items:center;gap:20px;margin-top:28px}.pp .ico{width:56px;height:56px;border-radius:14px;background:rgba(74,124,255,.08);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:32px}.pcard{background:#fff;border-radius:16px;padding:28px;border:1px solid #e8ecf2;transition:all .25s;cursor:default}.pcard:hover{border-color:#4a7cff;box-shadow:0 8px 28px rgba(74,124,255,.1);transform:translateY(-3px)}.pcard .pi{font-size:32px;margin-bottom:14px;transition:transform .3s}.pcard:hover .pi{transform:scale(1.15)}.pcard .pt{font-size:17px;font-weight:800;color:#1a2744;margin-bottom:4px}.pcard .pb{font-size:13px;font-weight:700;color:#4a7cff;margin-bottom:10px}.pcard .pd{font-size:14px;line-height:1.65}
.scg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-top:32px}.scol{background:#fff;border-radius:16px;padding:28px;border:1px solid #e8ecf2}.scol h4{font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:16px}.scol .si{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}.scol .si span{font-size:14px;line-height:1.5}
.tl-gantt{overflow-x:auto;border-radius:16px;border:1px solid #e8ecf2;background:#fff;margin-top:32px}.tl-gantt table{width:100%;border-collapse:collapse;min-width:700px}.tl-gantt th{padding:14px 6px;text-align:center;font-size:11px;font-weight:700;color:#8896b0;background:#f9fafd;border-bottom:1px solid #e8ecf2;min-width:48px}.tl-gantt th:first-child{text-align:left;padding-left:18px;min-width:140px}.tl-gantt td{padding:8px 3px;text-align:center;position:relative}.tl-gantt td:first-child{padding:12px 18px;font-size:13px;font-weight:600;color:#1a2744;white-space:nowrap;background:#fff}.tl-gantt tr{border-bottom:1px solid #f0f1f5}.bar{height:26px;border-radius:6px;margin:0 1px;transition:all .2s}.bar.active{opacity:1!important;transform:scaleY(1.25)}.tip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a2744;color:#fff;padding:10px 16px;border-radius:10px;font-size:12px;font-weight:600;white-space:nowrap;z-index:20;box-shadow:0 6px 20px rgba(26,39,68,.3);pointer-events:none;display:none}.tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#1a2744}
.qgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:28px}.qc{background:#fff;border:1px solid #e8ecf2;border-radius:14px;padding:20px 18px;transition:all .2s}.qc:hover{border-color:#4a7cff;box-shadow:0 4px 16px rgba(74,124,255,.1)}.qc .qq{font-size:13px;font-weight:800;color:#4a7cff;margin-bottom:4px}.qc .qt{font-size:14px;font-weight:700;color:#1a2744;margin-bottom:6px}.qc .qd{font-size:12px;line-height:1.5}
.rm{margin-top:32px;position:relative;padding-left:64px}.rm .ln{position:absolute;left:27px;top:24px;bottom:24px;width:3px;background:linear-gradient(180deg,#4a7cff,#e8ecf2);border-radius:4px}.rm-item{position:relative;margin-bottom:16px;z-index:1}.rm-dot{position:absolute;left:-37px;top:18px;width:48px;height:48px;border-radius:50%;border:3px solid #4a7cff;background:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#4a7cff;transition:all .25s;z-index:2}.rm-item:hover .rm-dot{background:#4a7cff;color:#fff;box-shadow:0 4px 16px rgba(74,124,255,.35)}.rm-card{margin-left:24px;background:#fff;border-radius:16px;padding:22px 26px;border:1px solid #e8ecf2;transition:all .25s;cursor:pointer}.rm-item:hover .rm-card{border-color:#4a7cff;box-shadow:0 6px 24px rgba(74,124,255,.12)}.rm-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.rm-tag{background:rgba(74,124,255,.08);color:#4a7cff;font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px}.rm-item:hover .rm-tag{background:rgba(74,124,255,.15)}.rm-bar{margin-top:16px;height:4px;background:#eef0f6;border-radius:4px;overflow:hidden}.rm-fill{height:100%;background:linear-gradient(90deg,#4a7cff,#6b93ff);border-radius:4px}
.wf{margin-top:32px;position:relative;padding-left:32px}.wf .ln{position:absolute;left:27px;top:28px;bottom:28px;width:2px;background:#e8ecf2}.wf-item{margin-bottom:10px;position:relative;z-index:1;display:flex;align-items:center;gap:20px}.wf-num{width:56px;height:56px;border-radius:50%;flex-shrink:0;border:3px solid #e8ecf2;background:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#8896b0;transition:all .3s;position:relative;z-index:2}.wf-item:hover .wf-num{border-color:#4a7cff;background:#4a7cff;color:#fff;box-shadow:0 4px 20px rgba(74,124,255,.3)}.wf-card{flex:1;background:#fff;border-radius:16px;padding:20px 26px;border:1px solid #e8ecf2;transition:all .25s;cursor:pointer}.wf-item:hover .wf-card{border-color:#4a7cff;box-shadow:0 6px 24px rgba(74,124,255,.1)}.wf-dur{background:rgba(74,124,255,.08);color:#4a7cff;font-size:12px;font-weight:700;padding:7px 16px;border-radius:20px;white-space:nowrap;transition:all .25s}.wf-item:hover .wf-dur{background:#4a7cff;color:#fff}.wf-body{max-height:0;overflow:hidden;transition:max-height .35s ease,margin-top .35s ease,opacity .25s ease;font-size:13px;color:#5a6a8a;line-height:1.7;margin-top:0;opacity:0}.wf-item:hover .wf-body{max-height:150px;margin-top:12px;opacity:1}
.act{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:32px}.actc{background:#fff;border-radius:18px;padding:28px 24px;position:relative;overflow:hidden;border:2px solid #e8ecf2;transition:all .3s;cursor:pointer}.actc:hover{border-color:#4a7cff;box-shadow:0 8px 32px rgba(74,124,255,.12);transform:translateY(-4px)}.atop{position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#4a7cff,#6b93ff);opacity:.25;transition:opacity .3s}.actc:hover .atop{opacity:1}.ai{display:flex;align-items:center;gap:10px;margin-bottom:10px;opacity:.8;transition:opacity .2s}.actc:hover .ai{opacity:1}.acheck{width:22px;height:22px;border-radius:6px;background:rgba(74,124,255,.08);display:flex;align-items:center;justify-content:center;font-size:11px;color:#4a7cff;font-weight:700;flex-shrink:0}.actc:hover .acheck{background:rgba(74,124,255,.15)}
.vp{background:rgba(74,124,255,.06);border-radius:16px;padding:28px 32px;border-left:4px solid #4a7cff;margin-top:32px}.vp h4{font-size:16px;font-weight:700;color:#1a2744;margin-bottom:10px}.vp p{font-size:15px;line-height:1.75;margin:0}
.wug{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:28px}.wuc{background:#f7f8fc;border-radius:16px;padding:24px 28px;transition:box-shadow .2s}.wuc:hover{box-shadow:0 4px 16px rgba(26,39,68,.06)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:32px 0}.sb{background:#fff;border-radius:18px;padding:32px;border:1px solid #e8ecf2;position:relative;overflow:hidden}
.sc{width:100%;height:120px;border-radius:12px;border:2px dashed #dde1e8;background:#fafbfc;cursor:crosshair;touch-action:none;display:block}.sc.done{border:2px solid #4a7cff;background:#f8faff;cursor:default}
.sbtns{display:flex;gap:10px;margin-top:8px}.sbtns button{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}.bcl{border:1px solid #dde1e8;background:#fff;color:#3a4560}.bcf{border:none;background:#4a7cff;color:#fff;font-weight:700}.bcf:disabled{background:#dde1e8;color:#8896b0;cursor:not-allowed}
.bf{padding:16px 48px;border-radius:14px;border:none;background:linear-gradient(135deg,#4a7cff,#3358d4);color:#fff;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px rgba(74,124,255,.3)}.bf:disabled{opacity:.5;cursor:not-allowed}
.ps{text-align:center;padding:40px 0;border-top:1px solid #e8ecf2;margin-top:32px}.ps h3{font-size:22px;font-weight:800;color:#1a2744;margin:8px 0}.ps p{font-size:15px;margin-bottom:28px}.psb{display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
.ba{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none}.bo{border:1px solid #e8ecf2;background:#fff;color:#1a2744}.bsq{border:none;background:#006aff;color:#fff;box-shadow:0 4px 16px rgba(0,106,255,.25)}
.sqsec{text-align:center;padding:48px 32px;background:#fff;border-radius:20px;border:1px solid #e8ecf2;max-width:520px;margin:0 auto}.sqprice{font-size:28px;font-weight:800;color:#4a7cff;margin:12px 0 24px}.sqbtn{display:inline-flex;align-items:center;gap:10px;background:#006aff;color:#fff;padding:16px 40px;border-radius:12px;font-size:17px;font-weight:700;text-decoration:none;font-family:inherit;box-shadow:0 4px 16px rgba(0,106,255,.25);transition:all .25s}.sqbtn:hover{background:#0052cc;transform:translateY(-2px)}.sqmeta{display:flex;justify-content:center;gap:24px;margin-top:24px;font-size:12px;color:#8896b0}
.ft{background:#1a2744;padding:28px;text-align:center;font-size:13px;color:rgba(255,255,255,.4)}
.nb{}
.kss{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:8px}.ksc{background:#fff;border-radius:16px;padding:28px 24px;border:1px solid #e8ecf2;border-top:3px solid #4a7cff}.ksn{font-size:17px;font-weight:800;color:#1a2744;margin-bottom:8px}.ksd{font-size:14px;line-height:1.6;color:#5a6a8a}
.nss{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:32px}.nsc{background:#fff;border-radius:16px;padding:28px 24px;border:1px solid #e8ecf2;position:relative}.nsn{font-size:36px;font-weight:800;color:rgba(74,124,255,.15);margin-bottom:8px;line-height:1}.nst{font-size:16px;font-weight:800;color:#1a2744;margin-bottom:8px}.nsd{font-size:14px;line-height:1.65;color:#5a6a8a}

@media(max-width:640px){.sg,.wug,.act,.scg,.kss,.nss{grid-template-columns:1fr}.qgrid{grid-template-columns:1fr 1fr}.cover h1{font-size:26px}.sec{padding:40px 20px}}
</style>
